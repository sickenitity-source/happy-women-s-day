<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Pratiksha</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: "Segoe UI", sans-serif;

    background: linear-gradient(135deg,#ffffff,#1f4e79,#b76e79);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
    color:#1f4e79;
}

.lever-box{
    position:relative;
    width:60px;
    height:200px;
    margin:30px auto;
    background:#eee;
    border-radius:30px;
}

.lever{
    position:absolute;
    width:60px;
    height:60px;
    background:#b76e79;
    border-radius:50%;
    cursor:grab;
    top:0;
}

#label{
    font-size:14px;
    color:#555;
}

#message{
    margin-top:20px;
    font-size:20px;
    display:none;
    color:#1f4e79;
}

</style>
</head>

<body>

<div class="container">

<h1>Pull the Lever</h1>
<p id="label">Pull me down</p>

<div class="lever-box">
<div class="lever" id="lever"></div>
</div>

<p id="message">
Happy Women's Day my strongest woman Pratiksha.<br>
You really mean a lot to me.
</p>

</div>

<script>

let lever = document.getElementById("lever");
let box = document.querySelector(".lever-box");
let message = document.getElementById("message");

let dragging = false;

lever.onmousedown = () => dragging = true;
document.onmouseup = () => dragging = false;

document.onmousemove = (e) => {

if(!dragging) return;

let rect = box.getBoundingClientRect();
let offset = e.clientY - rect.top - 30;

if(offset < 0) offset = 0;
if(offset > 140){
offset = 140;
message.style.display = "block";
}

lever.style.top = offset + "px";

};

</script>

</body>
</html>
